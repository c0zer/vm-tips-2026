name: Update Match Results

on:
  schedule:
    # Every 10 minutes during World Cup (June 11 – July 19, 2026)
    - cron: '*/10 * * * *'
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch live results
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/fetch-results.js

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update match results [skip ci]"
            git push
          fi
